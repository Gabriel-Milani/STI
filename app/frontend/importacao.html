<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Importação | Estoque TI</title>
    <link href="/assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="ops-app-page pixel-ops-page import-page">
<div class="container-fluid app-shell px-0"><div class="row g-0 min-vh-100">
    <aside class="sidebar pixel-sidebar"><nav id="appNav" class="nav flex-column pixel-nav"></nav></aside>
    <main class="pixel-main"><div class="pixel-content">
        <div id="alert"></div>
        <div class="import-layout">
            <section class="ops-form-panel">
                <div class="ops-panel-header"><span class="panel-kicker">Planilha</span><h2>Enviar arquivo</h2></div>
                <form id="importForm" class="import-form">
                    <input class="form-control" type="file" name="arquivo" accept=".xlsx,.xlsm" required>
                    <button class="btn btn-primary" type="submit" id="importButton">Importar</button>
                </form>
            </section>
            <section class="ops-form-panel">
                <div class="ops-panel-header"><span class="panel-kicker">Modelo esperado</span><h2>Cabeçalhos</h2></div>
                <div class="import-reference">
                    <div id="headers" class="import-header-list"></div>
                    <div id="importResult" class="mt-3"></div>
                </div>
            </section>
        </div>
    </div></main>
</div></div>
<script src="/assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/importacao.js"></script>
</body>
</html>
