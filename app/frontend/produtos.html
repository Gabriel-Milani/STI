<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produtos | Estoque TI</title>
    <link href="/assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="products-page pixel-ops-page">
<div class="container-fluid app-shell px-0">
    <div class="row g-0 min-vh-100">
        <aside class="sidebar pixel-sidebar">
            <nav id="appNav" class="nav flex-column pixel-nav"></nav>
        </aside>

        <main class="pixel-main">
            <div class="pixel-content">
                <div id="alert"></div>

                <section class="catalog-panel mb-3">
                    <form id="searchForm" class="catalog-search">
                        <div class="search-wrap">
                            <span class="search-icon">⌕</span>
                            <input class="form-control catalog-search-input" name="q" placeholder="Buscar por nome, modelo, código, localização...">
                        </div>
                        <button class="btn catalog-search-button" type="submit">⌕ Buscar</button>
                        <button class="btn catalog-clear-button" id="clearSearch" type="button">↻ Limpar</button>
                    </form>
                    <div class="filter-chips mt-3" id="filterChips">
                        <button class="filter-chip active" type="button" data-filter="todos"><span>▦</span> Todos</button>
                        <button class="filter-chip" type="button" data-filter="baixo"><span>⚠</span> Estoque baixo</button>
                        <button class="filter-chip" type="button" data-filter="zerado"><span>⊘</span> Zerados</button>
                    </div>
                    <div class="catalog-refine mt-3">
                        <label>
                            <span>Categoria</span>
                            <select class="form-select catalog-filter-select" id="categoryFilter">
                                <option value="">Todas as categorias</option>
                            </select>
                        </label>
                        <label>
                            <span>Localização</span>
                            <select class="form-select catalog-filter-select" id="locationFilter">
                                <option value="">Todas as localizações</option>
                            </select>
                        </label>
                        <label>
                            <span>Ordenar</span>
                            <select class="form-select catalog-filter-select" id="sortFilter">
                                <option value="nome">Nome</option>
                                <option value="estoque-asc">Menor estoque</option>
                                <option value="estoque-desc">Maior estoque</option>
                                <option value="categoria">Categoria</option>
                            </select>
                        </label>
                    </div>
                </section>

                <section class="catalog-metrics mb-3" id="catalogMetrics"></section>

                <span id="productCount" class="visually-hidden">0</span>

                <section id="productGrid" class="product-grid"></section>
            </div>
        </main>
    </div>
</div>
<script src="/assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/produtos.js"></script>
</body>
</html>
