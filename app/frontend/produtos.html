<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produtos | Estoque TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="products-page">
<div class="container-fluid app-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar p-3"><div class="text-white fw-semibold mb-3">Estoque TI</div><nav id="appNav" class="nav flex-column"></nav></aside>
    <main class="col-md-9 col-lg-10 p-3 p-lg-4"><div class="content-wrap mx-auto">
        <div class="products-hero mb-4">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
                <div>
                    <div class="pixel-kicker">Catálogo STI</div>
                    <h1 class="display-title mb-1">Produtos</h1>
                    <div class="products-subtitle">Encontre, confira e movimente itens do estoque com leitura rápida.</div>
                </div>
                <div class="d-flex gap-2 align-items-center"><a class="btn btn-light btn-sm hero-action" href="/produtos/novo">Novo produto</a><span id="userLabel" class="text-white-50 small align-self-center"></span><button class="btn btn-outline-light btn-sm" data-logout>Sair</button></div>
            </div>
        </div>
        <div id="alert"></div>
        <section class="catalog-panel mb-4">
            <form id="searchForm" class="catalog-search">
                <input class="form-control catalog-search-input" name="q" placeholder="Buscar por nome, modelo, código, localização...">
                <button class="btn btn-primary catalog-search-button" type="submit">Buscar</button>
                <button class="btn btn-outline-secondary catalog-clear-button" id="clearSearch" type="button">Limpar</button>
            </form>
            <div class="filter-chips mt-3" id="filterChips">
                <button class="filter-chip active" type="button" data-filter="todos">Todos</button>
                <button class="filter-chip" type="button" data-filter="baixo">Estoque baixo</button>
                <button class="filter-chip" type="button" data-filter="zerado">Zerados</button>
                <button class="filter-chip" type="button" data-filter="quantidade">Quantidade</button>
                <button class="filter-chip" type="button" data-filter="unidade">Unidade rastreável</button>
            </div>
        </section>
        <section>
            <div class="catalog-toolbar mb-3">
                <div><span id="productCount" class="fw-semibold">0</span> itens encontrados</div>
                <div class="small text-secondary">Cards operacionais de estoque</div>
            </div>
            <div id="productGrid" class="product-grid"></div>
        </section>
    </div></main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/produtos.js"></script>
</body>
</html>
