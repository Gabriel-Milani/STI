<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produtos | Estoque TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid app-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar p-3"><div class="text-white fw-semibold mb-3">Estoque TI</div><nav id="appNav" class="nav flex-column"></nav></aside>
    <main class="col-md-9 col-lg-10 p-3 p-lg-4"><div class="content-wrap mx-auto">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
            <div><h1 class="h3 mb-1">Produtos</h1><div class="text-secondary">Cadastro e consulta de itens.</div></div>
            <div class="d-flex gap-2"><a class="btn btn-primary btn-sm" href="/produtos/novo">Novo produto</a><span id="userLabel" class="text-secondary small align-self-center"></span><button class="btn btn-outline-secondary btn-sm" data-logout>Sair</button></div>
        </div>
        <div id="alert"></div>
        <div class="card shadow-sm"><div class="card-body">
            <form id="searchForm" class="row g-2 mb-3">
                <div class="col-md"><input class="form-control" name="q" placeholder="Buscar por nome, categoria, modelo, código, barras ou localização"></div>
                <div class="col-md-auto"><button class="btn btn-outline-primary w-100" type="submit">Buscar</button></div>
            </form>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead><tr><th>Produto</th><th>Localização</th><th>Status</th><th class="text-end">Qtd.</th></tr></thead>
                    <tbody id="productRows"></tbody>
                </table>
            </div>
        </div></div>
    </div></main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/produtos.js"></script>
</body>
</html>
