<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produto | Estoque TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid app-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar p-3"><div class="text-white fw-semibold mb-3">Estoque TI</div><nav id="appNav" class="nav flex-column"></nav></aside>
    <main class="col-md-9 col-lg-10 p-3 p-lg-4"><div class="content-wrap mx-auto">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
            <div><a href="/produtos" class="small text-decoration-none">Voltar</a><h1 id="productTitle" class="h3 mb-1">Produto</h1><div id="productMeta" class="text-secondary"></div></div>
            <div class="d-flex gap-2"><span id="userLabel" class="text-secondary small align-self-center"></span><button class="btn btn-outline-secondary btn-sm" data-logout>Sair</button></div>
        </div>
        <div id="alert"></div>
        <div class="row g-4">
            <section class="col-xl-4"><div class="card shadow-sm"><div class="card-body" id="productInfo"></div></div></section>
            <section class="col-xl-8">
                <div class="card shadow-sm mb-4"><div class="card-header bg-white fw-semibold">Movimentar</div><div class="card-body">
                    <form id="movementForm" class="vstack gap-3">
                        <input type="hidden" name="tipo" id="movementType" value="entrada">
                        <div id="movementTypeButtons" class="operation-grid">
                            <button class="operation-choice active" type="button" data-movement-type="entrada">Entrada</button>
                            <button class="operation-choice" type="button" data-movement-type="retirada">Retirada</button>
                            <button class="operation-choice" type="button" data-movement-type="emprestimo">Empréstimo</button>
                            <button class="operation-choice" type="button" data-movement-type="descarte">Descarte</button>
                        </div>
                        <div id="movementFields" class="row g-2"></div>
                        <div><button class="btn btn-primary" type="submit">Registrar</button></div>
                    </form>
                </div></div>
                <div class="card shadow-sm mb-4"><div class="card-header bg-white fw-semibold">Mover localização</div><div class="card-body">
                    <form id="moveForm" class="vstack gap-3">
                        <input type="hidden" name="localizacao_codigo" id="moveSelectedLocation" required>
                        <div>
                            <div class="small text-secondary mb-2">Prateleira</div>
                            <div id="moveShelfOptions" class="location-grid"></div>
                        </div>
                        <div>
                            <div class="small text-secondary mb-2">Localização</div>
                            <div id="moveLocationCards" class="location-grid"></div>
                        </div>
                        <div id="moveSelectionLabel" class="selected-location text-secondary">Escolha uma localização.</div>
                        <div class="row g-2">
                            <div class="col-md"><input class="form-control" name="observacao" placeholder="Observação"></div>
                            <div class="col-md-auto"><button class="btn btn-outline-primary w-100" type="submit">Mover</button></div>
                        </div>
                    </form>
                </div></div>
                <div class="card shadow-sm"><div class="card-header bg-white fw-semibold">Histórico</div><div class="table-responsive"><table class="table table-sm mb-0"><thead><tr><th>Data</th><th>Tipo</th><th>Qtd.</th><th>Obs.</th></tr></thead><tbody id="historyRows"></tbody></table></div></div>
            </section>
        </div>
    </div></main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/produto-detalhe.js"></script>
</body>
</html>
