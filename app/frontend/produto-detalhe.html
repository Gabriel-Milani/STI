<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produto | Estoque TI</title>
    <link href="/assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="ops-app-page pixel-ops-page product-detail-page">
<div class="container-fluid app-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar p-3"><nav id="appNav" class="nav flex-column"></nav></aside>
    <main class="col-md-9 col-lg-10 p-3 p-lg-4"><div class="content-wrap mx-auto">
        <div id="alert"></div>
        <div class="product-detail-layout">
            <section class="product-detail-aside">
                <div class="detail-panel product-summary-panel" id="productInfo"></div>
                <div class="detail-panel unit-panel d-none" id="unitCard">
                    <div class="detail-panel-header">
                        <div>
                            <span class="panel-kicker">Rastreamento</span>
                            <h2>Unidades</h2>
                        </div>
                        <span class="panel-chip" id="unitCountLabel">0</span>
                    </div>
                    <div id="unitRows" class="unit-grid"></div>
                </div>
            </section>
            <section class="product-detail-main">
                <div class="detail-panel movement-panel">
                    <div class="detail-panel-header">
                        <div>
                            <span class="panel-kicker">Operação rápida</span>
                            <h2>Movimentar estoque</h2>
                        </div>
                    </div>
                    <form id="movementForm" class="vstack gap-3" novalidate>
                        <input type="hidden" name="tipo" id="movementType" value="retirada">
                        <div id="movementTypeButtons" class="operation-grid">
                            <button class="operation-choice" type="button" data-movement-type="entrada">Entrada</button>
                            <button class="operation-choice active" type="button" data-movement-type="retirada">Retirada</button>
                            <button class="operation-choice" type="button" data-movement-type="emprestimo">Empréstimo</button>
                            <button class="operation-choice" type="button" data-movement-type="descarte">Descarte</button>
                        </div>
                        <div id="movementFields" class="row g-2"></div>
                        <div class="movement-submit-row"><button class="btn btn-primary" type="submit">Registrar movimentação</button></div>
                    </form>
                </div>
                <div class="detail-panel move-panel">
                    <div class="detail-panel-header">
                        <div>
                            <span class="panel-kicker">Mapa operacional</span>
                            <h2>Mover localização</h2>
                        </div>
                        <button class="btn btn-outline-primary btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#moveCollapse">Abrir mapa</button>
                    </div>
                    <div id="moveCollapse" class="collapse"><div class="card-body">
                        <form id="moveForm" class="vstack gap-3">
                            <input type="hidden" name="localizacao_codigo" id="moveSelectedLocation" required>
                            <div class="selected-location">
                                <div class="small text-secondary">Localização atual</div>
                                <div id="currentLocationLabel" class="fw-semibold"></div>
                                <div id="currentLocationCode" class="small text-secondary"></div>
                            </div>
                            <div>
                                <div class="small text-secondary mb-2">Nova prateleira</div>
                                <div id="moveShelfOptions" class="location-grid"></div>
                            </div>
                            <div>
                                <div class="small text-secondary mb-2">Nova localização</div>
                                <div id="moveLocationCards" class="location-grid"></div>
                            </div>
                            <div id="moveSelectionLabel" class="selected-location text-secondary">Escolha uma localização.</div>
                            <div class="row g-2">
                                <div class="col-md"><input class="form-control" name="observacao" placeholder="Observação"></div>
                                <div class="col-md-auto"><button class="btn btn-outline-primary w-100" type="submit">Confirmar movimentação</button></div>
                            </div>
                        </form>
                    </div></div>
                </div>
                <div class="detail-panel history-panel">
                    <div class="detail-panel-header">
                        <div>
                            <span class="panel-kicker">Linha do tempo</span>
                            <h2>Histórico</h2>
                        </div>
                    </div>
                    <div id="historyRows" class="history-list"></div>
                </div>
            </section>
        </div>
    </div></main>
</div></div>
<div class="modal fade" id="editProductModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable"><div class="modal-content">
        <form id="editProductForm">
            <div class="modal-header"><h2 class="modal-title h5">Editar produto</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button></div>
            <div class="modal-body">
                <div class="row g-3">
                    <div class="col-md-6"><input class="form-control" name="nome" placeholder="Nome" required></div>
                    <div class="col-md-6"><input class="form-control" name="categoria" placeholder="Categoria"></div>
                    <div class="col-md-6"><input class="form-control" name="modelo" placeholder="Modelo"></div>
                    <div class="col-md-6"><input class="form-control" name="codigo_barras" placeholder="Código de barras"></div>
                    <div class="col-md-4"><input class="form-control" type="number" min="0" name="estoque_minimo" placeholder="Estoque mínimo"></div>
                    <div class="col-12"><textarea class="form-control" name="observacao" rows="3" placeholder="Observação"></textarea></div>
                </div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" type="submit">Salvar</button></div>
        </form>
    </div></div>
</div>
<script src="/assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/produto-detalhe.js"></script>
</body>
</html>
