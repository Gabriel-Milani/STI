<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Novo produto | Estoque TI</title>
    <link href="/assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="ops-app-page pixel-ops-page">
<div class="container-fluid app-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar p-3"><nav id="appNav" class="nav flex-column"></nav></aside>
    <main class="col-md-9 col-lg-10 p-3 p-lg-4"><div class="content-wrap mx-auto">
        <div id="alert"></div>
        <form id="productForm">
            <div class="row g-4">
                <section class="col-xl-5">
                    <div class="card shadow-sm"><div class="card-header bg-white fw-semibold">Dados do produto</div>
                        <div class="card-body vstack gap-3">
                            <input class="form-control" name="nome" placeholder="Nome" required autofocus>
                            <input class="form-control" name="categoria" placeholder="Categoria">
                            <input class="form-control" name="modelo" placeholder="Modelo">
                            <input class="form-control" name="codigo_barras" placeholder="Código de barras">
                            <div class="row g-2"><div class="col"><input class="form-control" type="number" min="0" name="quantidade_inicial" placeholder="Qtd. inicial" value="0"></div><div class="col"><input class="form-control" type="number" min="0" name="estoque_minimo" placeholder="Mínimo" value="0"></div></div>
                            <textarea class="form-control" name="observacao" rows="3" placeholder="Observação"></textarea>
                        </div>
                    </div>
                </section>
                <section class="col-xl-7">
                    <div class="card shadow-sm"><div class="card-header bg-white fw-semibold">Localização</div>
                        <div class="card-body">
                            <input type="hidden" name="localizacao_codigo" id="selectedLocation" required>
                            <div class="mb-3">
                                <div class="small text-secondary mb-2">Prateleira</div>
                                <div id="shelfOptions" class="location-grid"></div>
                            </div>
                            <div>
                                <div class="small text-secondary mb-2">Localização</div>
                                <div id="locationCards" class="location-grid">
                                    <div class="text-secondary">Escolha uma prateleira primeiro.</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-3">
                        <a class="btn btn-outline-secondary" href="/produtos">Cancelar</a>
                        <button class="btn btn-primary" type="submit">Cadastrar produto</button>
                    </div>
                </section>
            </div>
        </form>
    </div></main>
</div></div>
<script src="/assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/produto-novo.js"></script>
</body>
</html>
