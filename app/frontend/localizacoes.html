<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Localizações | Estoque TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid app-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar p-3"><div class="text-white fw-semibold mb-3">Estoque TI</div><nav id="appNav" class="nav flex-column"></nav></aside>
    <main class="col-md-9 col-lg-10 p-3 p-lg-4"><div class="content-wrap mx-auto">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4"><div><h1 class="h3 mb-1">Localizações</h1><div class="text-secondary">Armários, prateleiras e posições.</div></div><div class="d-flex gap-2"><span id="userLabel" class="text-secondary small align-self-center"></span><button class="btn btn-outline-secondary btn-sm" data-logout>Sair</button></div></div>
        <div id="alert"></div>
        <div class="row g-4">
            <section class="col-lg-4"><div class="card shadow-sm"><div class="card-header bg-white fw-semibold">Nova localização</div><div class="card-body">
                <form id="locationForm" class="vstack gap-3">
                    <input class="form-control" name="codigo" placeholder="Código" required>
                    <input class="form-control" name="nome" placeholder="Nome" required>
                    <textarea class="form-control" name="descricao" rows="2" placeholder="Descrição"></textarea>
                    <div class="row g-2"><div class="col"><input class="form-control" name="armario" value="ARM01" required></div><div class="col"><input class="form-control" name="prateleira" placeholder="P1" required></div><div class="col"><input class="form-control" type="number" name="ordem" value="0"></div></div>
                    <button class="btn btn-primary" type="submit">Criar</button>
                </form>
            </div></div></section>
            <section class="col-lg-8"><div class="card shadow-sm"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Código</th><th>Nome</th><th>Prateleira</th><th class="text-end">Itens</th><th></th></tr></thead><tbody id="locationRows"></tbody></table></div></div></section>
        </div>
    </div></main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/localizacoes.js"></script>
</body>
</html>
