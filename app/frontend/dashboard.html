<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard | Estoque TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid app-shell">
        <div class="row">
            <aside class="col-md-3 col-lg-2 sidebar p-3">
                <div class="text-white fw-semibold mb-3">Estoque TI</div>
                <nav id="appNav" class="nav flex-column"></nav>
            </aside>
            <main class="col-md-9 col-lg-10 p-3 p-lg-4">
                <div class="content-wrap mx-auto">
                    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-4">
                        <div>
                            <h1 class="h3 mb-1">Dashboard</h1>
                            <div class="text-secondary">Resumo rápido do estoque.</div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span id="userLabel" class="text-secondary small"></span>
                            <button class="btn btn-outline-secondary btn-sm" data-logout>Sair</button>
                        </div>
                    </div>
                    <div id="alert"></div>
                    <section id="metrics" class="row g-3 mb-4"></section>
                    <div class="row g-4">
                        <section class="col-lg-6">
                            <div class="card shadow-sm">
                                <div class="card-header bg-white fw-semibold">Estoque crítico</div>
                                <div class="table-responsive">
                                    <table class="table table-sm mb-0">
                                        <thead><tr><th>Produto</th><th>Local</th><th class="text-end">Qtd.</th></tr></thead>
                                        <tbody id="criticalRows"></tbody>
                                    </table>
                                </div>
                            </div>
                        </section>
                        <section class="col-lg-6">
                            <div class="card shadow-sm">
                                <div class="card-header bg-white fw-semibold">Últimas movimentações</div>
                                <div class="table-responsive">
                                    <table class="table table-sm mb-0">
                                        <thead><tr><th>Produto</th><th>Tipo</th><th class="text-end">Qtd.</th></tr></thead>
                                        <tbody id="movementRows"></tbody>
                                    </table>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/dashboard.js"></script>
</body>
</html>
