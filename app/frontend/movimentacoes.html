<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movimentações | Estoque TI</title>
    <link href="/assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body class="movements-page ops-app-page pixel-ops-page">
<div class="container-fluid app-shell px-0">
    <div class="row g-0 min-vh-100">
        <aside class="sidebar pixel-sidebar">
            <nav id="appNav" class="nav flex-column pixel-nav"></nav>
        </aside>

        <main class="pixel-main movements-main">
            <div class="pixel-content movements-content">
                <div id="alert"></div>

                <section class="movements-toolbar">
                    <form id="movementFilterForm" class="movements-filter-form">
                        <label>
                            <span>Busca</span>
                            <input class="form-control" name="q" placeholder="Produto, código, responsável ou usuário...">
                        </label>
                        <label>
                            <span>Tipo</span>
                            <select class="form-select" id="movementTypeFilter">
                                <option value="">Todos os tipos</option>
                                <option value="entrada">Entrada</option>
                                <option value="retirada">Retirada</option>
                                <option value="emprestimo">Empréstimo</option>
                                <option value="devolucao">Devolução</option>
                                <option value="descarte">Descarte</option>
                                <option value="mover">Mover</option>
                            </select>
                        </label>
                        <button class="btn btn-primary" type="submit">Filtrar</button>
                        <button class="btn btn-outline-secondary" type="button" id="clearMovementFilters">Limpar</button>
                    </form>
                </section>

                <section class="movements-panel">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0 movements-table">
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Produto</th>
                                    <th>Tipo</th>
                                    <th>Responsáveis</th>
                                    <th>Feito por</th>
                                    <th class="text-end">Qtd.</th>
                                </tr>
                            </thead>
                            <tbody id="movementRows"></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>
<script src="/assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/movimentacoes.js"></script>
</body>
</html>
