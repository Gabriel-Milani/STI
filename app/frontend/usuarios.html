<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuários | Estoque TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid app-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar p-3"><div class="text-white fw-semibold mb-3">Estoque TI</div><nav id="appNav" class="nav flex-column"></nav></aside>
    <main class="col-md-9 col-lg-10 p-3 p-lg-4"><div class="content-wrap mx-auto">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
            <div><h1 class="h3 mb-1">Usuários</h1><div class="text-secondary">Controle simples de acesso ao sistema.</div></div>
            <div class="d-flex gap-2"><button class="btn btn-primary btn-sm" id="newUserButton">Novo usuário</button><span id="userLabel" class="text-secondary small align-self-center"></span><button class="btn btn-outline-secondary btn-sm" data-logout>Sair</button></div>
        </div>
        <div id="alert"></div>
        <div class="card shadow-sm"><div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead><tr><th>Nome</th><th>Usuário</th><th>Status</th><th>Último login</th><th class="text-end">Ações</th></tr></thead>
                <tbody id="userRows"></tbody>
            </table>
        </div></div>
    </div></main>
</div></div>

<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog"><div class="modal-content">
        <form id="userForm">
            <div class="modal-header"><h2 class="modal-title h5" id="userModalTitle">Novo usuário</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button></div>
            <div class="modal-body vstack gap-3">
                <input type="hidden" name="id" id="userId">
                <input class="form-control" name="nome" placeholder="Nome completo" required>
                <input class="form-control" name="usuario" placeholder="Usuário/login" required>
                <div id="passwordFields" class="vstack gap-3">
                    <input class="form-control" type="password" name="senha" placeholder="Senha">
                    <input class="form-control" type="password" name="confirmar_senha" placeholder="Confirmar senha">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="ativo" id="userActive" checked>
                    <label class="form-check-label" for="userActive">Ativo</label>
                </div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" type="submit">Salvar</button></div>
        </form>
    </div></div>
</div>

<div class="modal fade" id="passwordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog"><div class="modal-content">
        <form id="passwordForm">
            <div class="modal-header"><h2 class="modal-title h5">Resetar senha</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button></div>
            <div class="modal-body vstack gap-3">
                <input type="hidden" name="id" id="passwordUserId">
                <input class="form-control" type="password" name="senha" placeholder="Nova senha" required>
                <input class="form-control" type="password" name="confirmar_senha" placeholder="Confirmar nova senha" required>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" type="submit">Atualizar senha</button></div>
        </form>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/usuarios.js"></script>
</body>
</html>
