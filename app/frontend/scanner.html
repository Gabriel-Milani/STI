<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scanner | Estoque TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid app-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar p-3"><div class="text-white fw-semibold mb-3">Estoque TI</div><nav id="appNav" class="nav flex-column"></nav></aside>
    <main class="col-md-9 col-lg-10 p-3 p-lg-4"><div class="content-wrap mx-auto">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4"><div><h1 class="h3 mb-1">Scanner</h1><div class="text-secondary">Busca por código interno, barras ou localização.</div></div><div class="d-flex gap-2"><span id="userLabel" class="text-secondary small align-self-center"></span><button class="btn btn-outline-secondary btn-sm" data-logout>Sair</button></div></div>
        <div id="alert"></div>
        <form id="scanForm" class="input-group mb-4"><input class="form-control form-control-lg" name="codigo" placeholder="Digite ou leia o código" required autofocus><button class="btn btn-primary" type="submit">Buscar</button></form>
        <section id="scanResult"></section>
    </div></main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/scanner.js"></script>
</body>
</html>
