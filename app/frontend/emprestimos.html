<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Empréstimos | Estoque TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid app-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar p-3"><div class="text-white fw-semibold mb-3">Estoque TI</div><nav id="appNav" class="nav flex-column"></nav></aside>
    <main class="col-md-9 col-lg-10 p-3 p-lg-4"><div class="content-wrap mx-auto">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4"><div><h1 class="h3 mb-1">Empréstimos</h1><div class="text-secondary">Itens emprestados e devoluções.</div></div><div class="d-flex gap-2"><span id="userLabel" class="text-secondary small align-self-center"></span><button class="btn btn-outline-secondary btn-sm" data-logout>Sair</button></div></div>
        <div id="alert"></div>
        <div class="card shadow-sm"><div class="card-body">
            <div class="d-flex justify-content-end mb-3"><select id="statusFilter" class="form-select w-auto"><option value="aberto">Abertos</option><option value="todos">Todos</option><option value="devolvido">Devolvidos</option></select></div>
            <div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>Produto</th><th>Para</th><th>Destino</th><th>Data</th><th class="text-end">Qtd.</th><th></th></tr></thead><tbody id="loanRows"></tbody></table></div>
        </div></div>
    </div></main>
</div></div>
<div class="modal fade" id="returnModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog"><form id="returnForm" class="modal-content"><div class="modal-header"><h2 class="modal-title h5">Registrar devolução</h2><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button></div><div class="modal-body vstack gap-3"><input type="hidden" name="id" id="returnId"><input class="form-control" name="recebido_por" placeholder="Recebido por" required><textarea class="form-control" name="observacao" rows="2" placeholder="Observação"></textarea></div><div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" type="submit">Devolver</button></div></form></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/emprestimos.js"></script>
</body>
</html>
