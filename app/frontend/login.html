<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Estoque TI</title>
    <link href="/assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body>
    <main class="min-vh-100 d-flex align-items-center justify-content-center p-3">
        <section class="card login-card w-100 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-1">Estoque TI</h1>
                <p class="text-secondary mb-4">Acesse o controle do almoxarifado.</p>
                <div id="alert"></div>
                <form id="loginForm" class="vstack gap-3">
                    <div>
                        <label class="form-label" for="username">Usuário</label>
                        <input class="form-control" id="username" name="username" autocomplete="username" required autofocus>
                    </div>
                    <div>
                        <label class="form-label" for="password">Senha</label>
                        <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Entrar</button>
                </form>
            </div>
        </section>
    </main>
    <script src="/assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/login.js"></script>
</body>
</html>
