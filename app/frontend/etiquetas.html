<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Etiquetas | Estoque TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/styles.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid app-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar p-3"><div class="text-white fw-semibold mb-3">Estoque TI</div><nav id="appNav" class="nav flex-column"></nav></aside>
    <main class="col-md-9 col-lg-10 p-3 p-lg-4"><div class="content-wrap mx-auto">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4 no-print">
            <div><h1 class="h3 mb-1">Etiquetas</h1><div class="text-secondary">Impressão de QR Codes para produtos e localizações.</div></div>
            <div class="d-flex gap-2"><span id="userLabel" class="text-secondary small align-self-center"></span><button class="btn btn-outline-secondary btn-sm" data-logout>Sair</button></div>
        </div>
        <div id="alert"></div>
        <ul class="nav nav-tabs mb-3 no-print" id="labelTabs">
            <li class="nav-item"><button class="nav-link active" type="button" data-label-tab="products">Etiquetas de Produtos</button></li>
            <li class="nav-item"><button class="nav-link" type="button" data-label-tab="locations">Etiquetas de Localizações</button></li>
        </ul>
        <div class="card shadow-sm mb-3 no-print"><div class="card-body">
            <form id="filterForm" class="row g-2 align-items-end">
                <div class="col-md"><label class="form-label small text-secondary">Busca</label><input class="form-control" name="q" placeholder="Buscar por nome ou código"></div>
                <div class="col-md-3"><label class="form-label small text-secondary">Ordenar</label><select class="form-select" name="sort"><option value="nome">Nome</option><option value="codigo">Código</option></select></div>
                <div class="col-md-auto"><button class="btn btn-outline-primary w-100" type="submit">Filtrar</button></div>
                <div class="col-md-auto"><button class="btn btn-primary w-100" type="button" id="printBatch">Imprimir lote</button></div>
            </form>
        </div></div>
        <section id="productLabels" class="label-grid"></section>
        <section id="locationLabels" class="label-grid d-none"></section>
    </div></main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/etiquetas.js"></script>
</body>
</html>
